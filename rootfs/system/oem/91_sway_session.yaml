# Start the ly display manager on the installed desktop.
#
# The image bakes ly into multi-user.target.wants, but Kairos manages /etc as an
# overlay and forces `systemctl set-default multi-user.target` at boot, so the
# baked enablement gets shadowed and graphical.target (which would pull the
# display-manager) is never reached. This boot stage — the idiomatic Kairos way,
# mirroring 09_systemd_services.yaml — wires and starts ly against the live /etc
# on every boot of the installed system.
#
# Guarded so it does NOT run during the live/installer boot: there the installer
# (kairos-installer.service) owns tty1, and ly's own ConditionKernelCommandLine
# /ConditionPathExists drop-in keeps it from stealing the VT.
name: "sway-desktop session"
stages:
  boot:
    - if: '! grep -q "install-mode" /proc/cmdline && [ ! -f /run/cos/live_mode ]'
      name: "enable + start ly on the installed desktop"
      commands:
        - mkdir -p /etc/systemd/system/multi-user.target.wants
        - ln -sf /usr/lib/systemd/system/ly.service /etc/systemd/system/multi-user.target.wants/ly.service
        - systemctl daemon-reload
        - systemctl start ly.service || true
