# Hadron Desktop Tokyo Night GRUB theme — installed-system side.
#
# The installed system's GRUB reads its menu from the COS_STATE partition:
# /etc/cos/grub.cfg sources (${menu_blk})/grubmenu, and our grubmenu.cfg
# (rootfs/etc/kairos/branding/grubmenu.cfg) switches the menu to gfxterm and
# `set theme=(${menu_blk})/themes/hadron/theme.txt`. That theme dir only exists
# on STATE if we put it there — which is what this stage does.
#
# We mirror the kairos 08_grub stage: mount COS_STATE, drop the theme dir in,
# unmount; and re-run on every event that 08_grub re-injects grubmenu
# (install/upgrade/reset) so the theme never drifts out of sync with the menu
# that references it. Ordering: the filename sorts after 08_grub.yaml, and
# 08_grub unmounts STATE at the end of each hook, so we mount our own fresh copy.
# Everything is guarded on the theme file existing and gated off UKI boots
# (matching 08_grub), so it can never block install.
name: "Hadron GRUB theme"
stages:
    after-install:
    - &statemount
      name: "Mount state"
      if: '[ -e "/etc/kairos/branding/hadron-theme/theme.txt" ] && grep -vq "rd.immucore.uki" /proc/cmdline'
      commands:
      - |
          STATEDIR=/tmp/mnt/HADRONSTATE
          STATE=$(blkid -L COS_STATE || true)
          mkdir -p $STATEDIR || true
          mount ${STATE} $STATEDIR
    - &themeinstall
      name: "Install Hadron Tokyo Night GRUB theme + font + modules to STATE"
      if: '[ -e "/etc/kairos/branding/hadron-theme/theme.txt" ] && grep -vq "rd.immucore.uki" /proc/cmdline'
      commands:
      - |
          BR=/etc/kairos/branding/hadron-theme
          ST=/tmp/mnt/HADRONSTATE
          mkdir -p $ST/themes/hadron $ST/grub2/fonts $ST/grub2/x86_64-efi
          # theme.txt + background.tga next to each other (desktop-image is relative).
          cp -fv $BR/theme.txt $BR/background.tga $ST/themes/hadron/
          # grubmenu.cfg loadfont's this by explicit path; the installed EFI GRUB
          # ships no unicode.pf2, so without it gfxterm can't render and the menu
          # stays text-mode. Registered name is "Unifont Regular 16" (see theme.txt).
          cp -fv $BR/unicode.pf2 $ST/grub2/fonts/unicode.pf2
          # The installed EFI GRUB lacks gfxmenu/tga (and their deps) at its $prefix,
          # so grubmenu.cfg points $prefix at STATE and insmods them. Ship the whole
          # module tree + moddep.lst (the image's own, ABI-matched to the grub core)
          # so the dependency closures resolve. cp -a preserves it verbatim.
          cp -a /usr/lib/grub/x86_64-efi/. $ST/grub2/x86_64-efi/ || true
    - &stateumount
      name: "umount state"
      if: '[ -e "/etc/kairos/branding/hadron-theme/theme.txt" ] && grep -vq "rd.immucore.uki" /proc/cmdline'
      commands:
      - umount /tmp/mnt/HADRONSTATE

    after-upgrade:
    - <<: *statemount
    - <<: *themeinstall
    - <<: *stateumount

    after-reset:
    - <<: *statemount
    - <<: *themeinstall
    - <<: *stateumount
