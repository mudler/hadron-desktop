# Point the Kairos auto-installer at the sway-desktop interactive installer.
#
# kairos-init bakes /system/oem/...installer.yaml which generates a
# kairos-installer.service running `kairos-agent install` on tty1 in
# install-mode. This stage (90, same initramfs stage, same install-mode guard)
# drops a systemd override so that service runs /usr/local/bin/sway-install
# instead — a small wizard that collects user/password/disk/hostname, writes a
# cloud-config to /oem, then hands off to `kairos-agent install`. If a
# cloud-config with a user/install block was already provided, the wizard skips
# the prompts and runs the normal unattended install.
name: "sway-desktop installer UI"
stages:
  initramfs:
    - if: 'grep -q "install-mode" /proc/cmdline && ([ -f /run/cos/live_mode ] || [ -f /run/cos/uki_install_mode ])'
      name: "point kairos-installer at the sway-desktop installer"
      files:
        - path: /etc/systemd/system/kairos-installer.service.d/10-sway.conf
          permissions: 0644
          owner: 0
          group: 0
          content: |
            [Service]
            ExecStart=
            ExecStart=/usr/local/bin/sway-install
      commands:
        - systemctl daemon-reload
