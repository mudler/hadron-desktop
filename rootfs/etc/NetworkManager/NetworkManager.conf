# NetworkManager configuration for the Hadron sway desktop.
[main]
plugins=keyfile
dhcp=internal
# Single-user desktop: no polkit, all actions allowed for the local user.
auth-polkit=false
# NetworkManager owns DNS / resolv.conf.
dns=default
rc-manager=symlink

[device]
wifi.backend=wpa_supplicant

[logging]
level=INFO
