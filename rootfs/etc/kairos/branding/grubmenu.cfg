# Hadron Desktop installed-system GRUB menu fragment. kairos-init copies this to
# the COS_STATE partition as /grubmenu (08_grub.yaml "Grub branding"); the main
# /etc/cos/grub.cfg sources it from (${menu_blk}) at the end, so it can both add
# menu entries AND switch the menu to the Tokyo Night gfxterm theme. (menu_blk is
# the device holding /grubmenu — i.e. COS_STATE.)

# Tokyo Night theme on gfxterm. The installed EFI GRUB is minimal: it ships no
# unicode.pf2 font and not the gfxmenu/tga/png modules at its $prefix (the EFI
# partition), so `loadfont unicode` fails, `set theme` is silently ignored (no
# gfxmenu to interpret it), and the menu falls back to plain text. The
# 09_hadron_grub_theme oem stage drops everything we need on COS_STATE: the theme
# dir (themes/hadron/{theme.txt,background.tga}), the font (grub2/fonts/unicode.pf2),
# and the FULL grub module tree + moddep.lst (grub2/x86_64-efi/). Here we point
# $prefix at STATE so `insmod gfxmenu`/`insmod tga` auto-resolve their whole
# dependency closures from there, then restore $prefix so the boot entries are
# unaffected. The font is loaded by explicit path; theme.txt's desktop-image is a
# TGA because GRUB's png.mod rejects valid PNGs ("unsupported format"). Everything is
# guarded on the assets existing, so a missing one just leaves the plain text menu
# and can never block boot.
insmod gfxterm
if [ -f (${menu_blk})/grub2/x86_64-efi/gfxmenu.mod ]; then
    set saved_prefix="${prefix}"
    set prefix=(${menu_blk})/grub2
    insmod gfxmenu
    insmod tga
    set prefix="${saved_prefix}"
fi
if [ -f (${menu_blk})/grub2/fonts/unicode.pf2 ]; then
    loadfont (${menu_blk})/grub2/fonts/unicode.pf2
fi
if [ -f (${menu_blk})/themes/hadron/theme.txt ]; then
    set gfxmode=auto
    terminal_output gfxterm
    set theme=(${menu_blk})/themes/hadron/theme.txt
fi

# Quiet the kernel boot. The themed gfxterm menu leaves the GPU in a graphics
# mode, so without this the fast-scrolling boot messages render as colourful
# static on the framebuffer and bleed over the late-boot hadron-splash until a
# mode switch. `quiet loglevel=3` drops that message churn so the splash shows on
# a clean screen. extra_cmdline is appended to every boot entry's kernel cmdline;
# we preserve any pre-existing value (e.g. from grubenv) and add to it.
set extra_cmdline="${extra_cmdline} quiet loglevel=3"

menuentry "${display_name} remote recovery" --id remoterecovery {
    search --no-floppy --label --set=root COS_RECOVERY
    if [ test -s /cOS/recovery.squashfs ]; then
        set img=/cOS/recovery.squashfs
        set recoverylabel=COS_RECOVERY
    else
        set img=/cOS/recovery.img
    fi
    set label=COS_SYSTEM
    if [ -d (loop0) ]; then
        loopback -d loop0
    fi
    loopback loop0 /$img
    set root=($root)
    source (loop0)/etc/cos/bootargs.cfg
    linux (loop0)$kernel $kernelcmd ${extra_cmdline} ${extra_recovery_cmdline} vga=795 nomodeset kairos.remote_recovery_mode
    initrd (loop0)$initramfs
}
